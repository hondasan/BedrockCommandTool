                id: 'tp', name: '/tp', description: 'テレポート(ワープ)する', category: 'teleport',
                args: [
                    { key: 'target', label: 'だれを', type: 'selector' },
                    { key: 'destination', label: 'どこへ (座標/人)', type: 'coords' }
                ]
            },
            {
                id: 'locate', name: '/locate', description: '建物やバイオームを探す', category: 'teleport',
                args: [
                    { key: 'category', label: '種類', type: 'select', options: [{ label: '構造物 (structure)', value: 'structure' }, { label: 'バイオーム (biome)', value: 'biome' }] },
                    { key: 'thing', label: '名前', type: 'text', placeholder: 'ancient_city' }
                ]
            },
            {
                id: 'spawnpoint', name: '/spawnpoint', description: '復活地点を決める', category: 'teleport',
                args: [
                    { key: 'target', label: 'だれの', type: 'selector', optional: true },
                    { key: 'coords', label: 'どこに', type: 'coords', optional: true }
                ]
            },
            // --- Advanced ---
            {
                id: 'gamerule', name: '/gamerule', description: 'ゲームのルールを変える', category: 'advanced',
                args: [
                    {
                        key: 'rule', label: 'ルール', type: 'select',
                        options: [
                            { label: '座標を出す (showcoordinates)', value: 'showcoordinates' }, { label: 'ずっと昼 (dodaylightcycle)', value: 'dodaylightcycle' }, { label: '天気を固定 (doweathercycle)', value: 'doweathercycle' }, { label: 'アイテム落とす (keepinventory)', value: 'keepinventory' }, { label: 'モブ湧き (domobspawning)', value: 'domobspawning' }, { label: 'TNT爆発 (tntexplodes)', value: 'tntexplodes' }, { label: '火が広がる (dofiretick)', value: 'dofiretick' }, { label: 'PvP (プレイヤー攻撃)', value: 'pvp' }, { label: 'コマンドブロック許可', value: 'commandblocksenabled' },
                        ]
                    },
                    { key: 'value', label: 'オン/オフ', type: 'boolean' }
                ]
            },
            {
                id: 'scoreboard', name: '/scoreboard', description: 'スコアボード(点数)をつける', category: 'advanced',
                args: [
                    { key: 'target', label: '対象', type: 'select', options: [{label: '設定(objectives)', value: 'objectives'}, {label: '点数(players)', value: 'players'}] },
                    { key: 'action', label: '操作', type: 'select', options: [{label: '追加(add)', value: 'add'}, {label: '削除(remove)', value: 'remove'}, {label: 'セット(set)', value: 'set'}, {label: '表示(setdisplay)', value: 'setdisplay'}] },
                    { key: 'name', label: '名前/人', type: 'text', placeholder: 'money / @s' },
                    { key: 'value', label: '数値', type: 'int', optional: true }
                ]
            },
            {
                id: 'tickingarea', name: '/tickingarea', description: '離れても動くエリアを作る', category: 'advanced',
                args: [
                    { key: 'action', label: 'アクション', type: 'select', options: [{label: '追加(add)', value: 'add'}, {label: '削除(remove)', value: 'remove'}, {label: '一覧(list)', value: 'list'}] },
                    { key: 'shape', label: '形', type: 'select', optional: true, options: [{label: '円(circle)', value: 'circle'}, {label: '四角(square)', value: 'square'}] },
                    { key: 'coords', label: '中心/座標', type: 'coords', optional: true },
                    { key: 'range', label: '範囲(1~4)', type: 'int', optional: true }
                ]
            }
        ];

        // --- 2. アプリケーションロジック (Vanilla JS Optimized) ---

        const app = {
            state: {
                activeCategory: 'all',
                searchQuery: '',
                selectedCommandId: null,
                argsValues: {},
                activeArgIndex: 0,
                copied: false,
                blockCategory: 'weapon', // デフォルトカテゴリ変更
                history: [] 
            },

            lastRendered: { commandId: null, argIndex: null, blockCategory: null },
            searchTimeout: null,

            getSelectedCommand() {
                return COMMANDS_DATA.find(cmd => cmd.id === this.state.selectedCommandId) || null;
            },

            init() {
                this.loadHistory();
                this.updateTabs();
                this.updateList();
                this.updateBuilder();
                
                document.getElementById('search-input').addEventListener('input', (e) => {
                    clearTimeout(this.searchTimeout);
                    this.searchTimeout = setTimeout(() => {
                        this.state.searchQuery = e.target.value;
                        this.updateList();
                    }, 300);
                });
                
                lucide.createIcons();
            },

            loadHistory() {
                try {
                    const h = localStorage.getItem('bedrock_cmd_history');
                    if (h) this.state.history = JSON.parse(h);
                } catch(e) { console.error(e); }
            },

            saveHistory(item) {
                const existingIdx = this.state.history.findIndex(h => h.fullString === item.fullString);
                let newHistory = [...this.state.history];
                if (existingIdx !== -1) newHistory.splice(existingIdx, 1);
                newHistory.unshift(item);
                if (newHistory.length > 20) newHistory = newHistory.slice(0, 20);
                this.state.history = newHistory;
                localStorage.setItem('bedrock_cmd_history', JSON.stringify(newHistory));
                if (this.state.activeCategory === 'history') this.updateList();
            },

            setState(updates) {
                this.state = { ...this.state, ...updates };
                if (updates.activeCategory !== undefined) {
                    this.updateTabs(); 
                    this.updateList();
                }
                if (updates.selectedCommandId !== undefined || 
                    updates.argsValues !== undefined || 
                    updates.activeArgIndex !== undefined || 
                    updates.blockCategory !== undefined || 
                    updates.copied !== undefined) {
                    this.updateBuilder();
                }
            },

            handleCommandSelect(commandId, initialArgs = {}) {
                this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                this.setState({
                    selectedCommandId: commandId,
                    argsValues: initialArgs,
                    activeArgIndex: 0,
                    copied: false
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            handleCategorySelect(categoryId) {
                this.setState({ activeCategory: categoryId });
            },

            handleClearCommand() {
                this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                this.setState({ selectedCommandId: null, argsValues: {} });
            },

            handleTextInput(key, value) {
                this.state.argsValues = { ...this.state.argsValues, [key]: value };
                const cmd = this.getSelectedCommand();
                if (cmd) {
                    const argIndex = cmd.args.findIndex(a => a.key === key);
                    if (argIndex !== -1) {
                        const span = document.getElementById(`preview-arg-${argIndex}`);
                        if (span) {
                            span.innerText = value || key;
                            if (value) {
                                span.classList.add('bg-[#3C8527]', 'text-white', 'border-b-0');
                                span.classList.remove('text-gray-600', 'border-dashed', 'text-white', 'border-b');
                            }
                        }
                    }
                }
            },

            updateArgValue(key, value) {
                const newArgs = { ...this.state.argsValues, [key]: value };
                this.setState({ argsValues: newArgs });
            },

            nextArg() {
                const cmd = this.getSelectedCommand();
                if (cmd && this.state.activeArgIndex < cmd.args.length - 1) {
                    this.setState({ activeArgIndex: this.state.activeArgIndex + 1 });
                }
            },

            prevArg() {
                if (this.state.activeArgIndex > 0) {
                    this.setState({ activeArgIndex: this.state.activeArgIndex - 1 });
                }
            },

            setAndNext(key, value) {
                this.state.argsValues = { ...this.state.argsValues, [key]: value };
                this.updateBuilder(true); 
                setTimeout(() => {
                    const cmd = this.getSelectedCommand();
                    if (cmd && this.state.activeArgIndex < cmd.args.length - 1) {
                        this.setState({ activeArgIndex: this.state.activeArgIndex + 1 });
                    }
                }, 150);
            },

            setBlockCategory(category) {
                this.setState({ blockCategory: category });
            },

            generateCommandString(cmd, args) {
                if (!cmd) return '';
                let cmdStr = cmd.name;
                cmd.args.forEach(arg => {
                    const val = args[arg.key];
                    if (val) {
                         if (cmd.id === 'xp' && arg.key === 'type' && val === 'L') {
                             cmdStr += ` ${val}`;
                        } else {
                             cmdStr += ` ${val}`;
                        }
                    }
                });
                return cmdStr;
            },

            copyToClipboard() {
                const cmd = this.getSelectedCommand();
                if (!cmd) return;
                const cmdStr = this.generateCommandString(cmd, this.state.argsValues);
                const textArea = document.createElement("textarea");
                textArea.value = cmdStr;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    this.setState({ copied: true });
                    setTimeout(() => this.setState({ copied: false }), 2000);
                    this.saveHistory({
                        cmdId: cmd.id,
                        argsValues: { ...this.state.argsValues },
                        fullString: cmdStr,
                        timestamp: Date.now()
                    });
                } catch (err) { console.error(err); }
                document.body.removeChild(textArea);
            },

            updateTabs() {
                const cats = [
                    { id: 'all', label: 'ぜんぶ', icon: 'list' },
                    { id: 'history', label: 'りれき', icon: 'history' },
                    { id: 'basic', label: 'きほん', icon: 'terminal' },
                    { id: 'cheat', label: 'チート', icon: 'zap' },
                    { id: 'fun', label: 'あそび', icon: 'gamepad-2' },
                    { id: 'build', label: 'けんちく', icon: 'box' },
                    { id: 'teleport', label: 'いどう', icon: 'map-pin' },
                    { id: 'advanced', label: 'すごい', icon: 'cpu' }
                ];
                
                const html = cats.map(cat => `
                    <button
                        onclick="app.handleCategorySelect('${cat.id}')"
                        class="flex items-center gap-2 px-4 py-2 rounded-full whitespace-nowrap transition-colors border ${
                        this.state.activeCategory === cat.id 
                            ? 'bg-[#3C8527] text-white border-[#3C8527] shadow-lg shadow-green-900/50' 
                            : 'bg-[#2a2a2a] text-gray-400 border-[#444] hover:bg-[#333]'
                        }">
                        <i data-lucide="${cat.icon}" class="w-4 h-4"></i>
                        <span class="text-sm font-medium">${cat.label}</span>
                    </button>
                `).join('');
                document.getElementById('category-tabs').innerHTML = html;
                lucide.createIcons();
            },

            updateList() {
                let html = '';
                if (this.state.activeCategory === 'history') {
                    if (this.state.history.length === 0) {
                        html = '<div class="text-center py-10 text-gray-500">りれきがありません。<br>コマンドを作ってコピーすると<br>ここにのこります。</div>';
                    } else {
                        html = this.state.history.map((item, idx) => {
                            const cmd = COMMANDS_DATA.find(c => c.id === item.cmdId);
                            if (!cmd) return '';
                            return `
                            <button
                                onclick="app.restoreFromHistory(${idx})"
                                class="text-left p-4 rounded-xl border-2 border-[#3a3a3a] bg-[#2a2a2a] hover:border-[#555] active:scale-[0.98] transition-all w-full group relative overflow-hidden">
                                <div class="absolute right-0 top-0 p-1 bg-[#3C8527] text-white text-[10px] rounded-bl font-bold">HISTORY</div>
                                <div class="font-mono text-base font-bold text-[#51cf38] mb-1 truncate">${item.fullString}</div>
                                <div class="text-xs text-gray-400 flex items-center gap-1">
                                    <i data-lucide="rotate-ccw" class="w-3 h-3"></i> 
                                    <span>${cmd.name} - もういちどつかう</span>
                                </div>
                            </button>`;
                        }).join('');
                    }
                } else {
                    const filtered = COMMANDS_DATA.filter(cmd => {
                        const matchesCategory = this.state.activeCategory === 'all' || cmd.category === this.state.activeCategory;
                        const matchesSearch = cmd.name.toLowerCase().includes(this.state.searchQuery.toLowerCase()) || 
                                              cmd.description.includes(this.state.searchQuery) ||
                                              (cmd.name.replace('/', '')).includes(this.state.searchQuery);
                        return matchesCategory && matchesSearch;
                    });

                    html = filtered.length === 0 
                        ? '<div class="text-center py-10 text-gray-500">みつかりませんでした</div>'
                        : filtered.map(cmd => {
                            const isSelected = this.state.selectedCommandId === cmd.id;
                            const syntax = cmd.name + ' ' + cmd.args.map(a => a.optional ? `[${a.label}]` : `<${a.label}>`).join(' ');
                            return `
                            <button
                                onclick="app.handleCommandSelect('${cmd.id}')"
                                class="text-left p-4 rounded-xl border-2 transition-all active:scale-[0.98] group w-full ${
                                isSelected
                                    ? 'bg-[#2d3a2d] border-[#3C8527] ring-1 ring-[#3C8527]'
                                    : 'bg-[#2a2a2a] border-[#3a3a3a] hover:border-[#555]'
                                }">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-mono text-lg font-bold text-[#51cf38] group-hover:text-white transition-colors">
                                        ${cmd.name}
                                    </span>
                                    <i data-lucide="chevron-right" class="w-6 h-6 text-gray-600 transition-transform ${isSelected ? 'rotate-90 text-[#3C8527]' : ''}"></i>
                                </div>
                                <div class="text-base font-bold text-gray-200 mb-2">${cmd.description}</div>
                                <div class="text-xs font-mono text-gray-500 bg-[#151515] p-2 rounded inline-block border border-[#333]">
                                    ${syntax}
                                </div>
                            </button>`;
                        }).join('');
                }
                document.getElementById('command-list').innerHTML = html;
                lucide.createIcons();
            },

            restoreFromHistory(idx) {
                const item = this.state.history[idx];
                if (item) this.handleCommandSelect(item.cmdId, item.argsValues);
            },

            updateBuilder(forceUpdate = false) {
                const cmd = this.getSelectedCommand();
                const container = document.getElementById('builder-area');

                if (!cmd) {
                    if (this.lastRendered.commandId !== null) { 
                        container.innerHTML = `
                        <div class="bg-[#2a2a2a] border-2 border-dashed border-[#444] rounded-xl p-8 text-center text-gray-500">
                            <i data-lucide="terminal" class="w-16 h-16 mx-auto mb-3 opacity-20"></i>
                            <p class="font-bold text-lg">コマンドをえらんでね</p>
                        </div>`;
                        lucide.createIcons();
                        this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                    }
                    return;
                }

                const shouldFullRender = forceUpdate || 
                                       this.state.copied || 
                                       cmd.id !== this.lastRendered.commandId || 
                                       this.state.activeArgIndex !== this.lastRendered.argIndex ||
                                       this.state.blockCategory !== this.lastRendered.blockCategory;

                if (!shouldFullRender) return;

                this.lastRendered = { 
                    commandId: cmd.id, 
                    argIndex: this.state.activeArgIndex, 
                    blockCategory: this.state.blockCategory 
                };

                const activeArg = cmd.args[this.state.activeArgIndex];
                
                const previewSpans = cmd.args.map((arg, idx) => {
                    const isActive = idx === this.state.activeArgIndex;
                    const hasValue = !!this.state.argsValues[arg.key];
                    const val = this.state.argsValues[arg.key] || arg.key;
                    let classes = "mx-1 px-2 py-0.5 rounded cursor-pointer transition-colors inline-block text-sm md:text-base font-bold ";
                    if (isActive) {
                        classes += "bg-[#3C8527] text-white ring-2 ring-white/50";
                    } else if (hasValue) {
                        classes += "text-white border-b-2 border-gray-600";
                    } else {
                        classes += "text-gray-600 border border-dashed border-gray-700";
                    }
                    return `<span id="preview-arg-${idx}" onclick="app.setState({ activeArgIndex: ${idx} })" class="${classes}">${val}</span>`;
                }).join('');

                container.innerHTML = `
                <div class="bg-[#2a2a2a] border-2 border-[#585858] rounded-xl overflow-hidden shadow-xl ring-4 ring-[#151515] animate-fade-in">
                    <div class="bg-[#353535] px-4 py-3 border-b border-[#585858] flex justify-between items-center">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="text-[#51cf38] font-bold font-mono text-lg">${cmd.name}</span>
                            <span class="text-xs text-gray-400 truncate">${cmd.description}</span>
                        </div>
                        <button onclick="app.handleClearCommand()" class="text-gray-400 hover:text-white p-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="p-5 bg-[#151515] border-b border-[#333]">
                        <div class="font-mono text-xl break-all leading-relaxed">
                            <span class="text-[#51cf38] font-bold">${cmd.name}</span>
                            ${previewSpans}
                        </div>
                    </div>

                    <div class="px-5 py-3 bg-[#1a1a1a] flex justify-end border-b border-[#333]">
                        <button 
                            onclick="app.copyToClipboard()"
                            class="flex items-center gap-2 px-8 py-3 rounded-lg font-bold text-lg transition-all active:scale-95 shadow-lg ${
                            this.state.copied 
                                ? 'bg-white text-[#3C8527]' 
                                : 'bg-[#51cf38] text-[#1a1a1a] hover:bg-[#61df48]'
                            }">
                            ${this.state.copied 
                                ? '<i data-lucide="check" class="w-6 h-6"></i> コピーしたよ！' 
                                : '<i data-lucide="copy" class="w-6 h-6"></i> コピーする'}
                        </button>
                    </div>

                    <div class="p-5 bg-[#222]">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-bold text-gray-300 uppercase flex items-center gap-2">
                                <i data-lucide="edit-3" class="w-5 h-5 text-[#51cf38]"></i>
                                えらぶ: <span class="text-white bg-[#333] px-3 py-1 rounded-lg ml-1 text-base">
                                    ${activeArg ? activeArg.label : 'かんりょう'}
                                </span>
                            </h3>
                            <div class="flex gap-2">
                                <button onclick="app.prevArg()" ${this.state.activeArgIndex === 0 ? 'disabled' : ''} class="p-3 rounded-lg bg-[#333] disabled:opacity-30 text-white active:bg-[#444]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                                <button onclick="app.nextArg()" ${this.state.activeArgIndex === cmd.args.length - 1 ? 'disabled' : ''} class="p-3 rounded-lg bg-[#333] disabled:opacity-30 text-white active:bg-[#444]"><i data-lucide="arrow-right" class="w-5 h-5"></i></button>
                            </div>
                        </div>

                        <div class="min-h-[180px]">
                            ${activeArg ? this.renderInputControl(activeArg) : `
                                <div class="flex flex-col items-center justify-center h-full text-gray-500 py-6">
                                    <i data-lucide="check-circle" class="w-16 h-16 mb-4 text-[#3C8527]"></i>
                                    <p class="text-lg font-bold text-white">できあがり！</p>
                                    <p class="text-sm">上の「コピーする」ボタンをおしてね</p>
                                </div>
                            `}
                        </div>
                    </div>
                </div>`;
                lucide.createIcons();

                const txtInput = container.querySelector('input[type="text"]');
                const argVal = activeArg ? this.state.argsValues[activeArg.key] : null;
                if(txtInput && !argVal && document.activeElement !== txtInput) { 
                     txtInput.focus();
                }
            },

            renderGridSelector(arg, presets, activeCategory, setCategoryFunc) {
                 const keys = Object.keys(presets);
                 // カテゴリタブ
                 const tabsHtml = `
                    <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide mb-2">
                        ${keys.map(cat => {
                            let label = cat;
                            // 簡易翻訳
                            if(cat==='weapon') label='ぶき';
                            if(cat==='armor') label='ぼうぐ';
                            if(cat==='tool') label='どうぐ';
                            if(cat==='food') label='たべもの';
                            if(cat==='block') label='ブロック';
                            if(cat==='rare') label='レア';
                            if(cat==='redstone') label='回路';
                            if(cat==='boss') label='ボス';
                            if(cat==='enemy') label='てき';
                            if(cat==='friend') label='みかた';
                            if(cat==='item') label='もの';
                            if(cat==='fun') label='たのしい';
                            if(cat==='mob') label='こえ';
                            if(cat==='magic') label='まほう';
                            if(cat==='nature') label='しぜん';
                            
                            return `
                            <button 
                                onclick="app.${setCategoryFunc}('${cat}')"
                                class="text-sm px-4 py-2 rounded-full whitespace-nowrap border font-bold ${
                                    activeCategory === cat 
                                    ? 'bg-[#51cf38] text-black border-[#51cf38]'
                                    : 'bg-[#333] text-gray-400 border-[#444]'
                                }">
                                ${label}
                            </button>
                        `}).join('')}
                    </div>`;

                 const itemsHtml = `
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        ${presets[activeCategory].map(item => `
                            <button
                                onclick="app.setAndNext('${arg.key}', '${item.value}')"
                                class="p-3 rounded-xl flex flex-col items-center justify-center border-2 transition-all hover:bg-[#444] active:scale-95 ${
                                    (this.state.argsValues[arg.key] === item.value)
                                    ? 'bg-[#333] border-[#51cf38] text-[#51cf38]'
                                    : 'bg-[#2a2a2a] border-[#333] text-gray-300'
                                }">
                                <span class="text-sm font-bold mb-1">${item.label}</span>
                                <span class="text-[10px] font-mono text-gray-500 truncate w-full text-center">${item.value}</span>
                            </button>
                        `).join('')}
                    </div>`;
                    
                 return `<div class="space-y-2">${tabsHtml}${itemsHtml}</div>`;
            },

            renderInputControl(arg) {
                const val = this.state.argsValues[arg.key] || '';
                const optionalMsg = arg.optional ? '<div class="mb-2 text-xs text-yellow-500 flex items-center gap-1 font-bold">💡 えらばなくてもOK (スキップできるよ)</div>' : '';
                let controlHtml = '';

                switch(arg.type) {
                    case 'select':
                    case 'boolean':
                        const opts = arg.type === 'boolean' ? BOOLEAN_OPTS : arg.options;
                        controlHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${opts.map(opt => `
                                <button
                                    onclick="app.setAndNext('${arg.key}', '${opt.value}')"
                                    class="p-4 rounded-xl text-left border-l-8 transition-all active:scale-95 shadow-sm ${
                                    val === opt.value
                                        ? 'bg-[#2d3a2d] border-[#3C8527] text-white'
                                        : 'bg-[#3a3a3a] border-transparent text-gray-300 hover:bg-[#4a4a4a]'
                                    }">
                                    <div class="font-bold text-lg">${opt.label.split(' (')[0]}</div>
                                    <div class="text-xs text-gray-400 mt-1">${opt.value}</div>
                                </button>
                            `).join('')}
                        </div>`;
                        break;

                    case 'selector':
                        controlHtml = `<div class="grid grid-cols-3 gap-2">
                            ${SELECTORS.map(sel => `
                                <button
                                    onclick="app.setAndNext('${arg.key}', '${sel.value}')"
                                    class="p-3 rounded-xl text-center transition-all border-b-4 active:border-b-0 active:translate-y-1 ${
                                        val === sel.value
                                        ? 'bg-[#3C8527] border-[#2a611b] text-white'
                                        : 'bg-[#3a3a3a] border-[#252525] text-[#51cf38] hover:bg-[#4a4a4a]'
                                    }">
                                    <div class="text-xl font-bold font-mono mb-1">${sel.value}</div>
                                    <div class="text-[10px] font-bold text-gray-300">${sel.label.split(' (')[0]}</div>
                                </button>
                            `).join('')}
                            <div class="col-span-3 mt-2">
                                <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="または プレイヤーのなまえ" class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white focus:border-[#3C8527] outline-none font-bold" />
                            </div>
                        </div>`;
                        break;

                    case 'coords':
                        controlHtml = `<div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                ${COORDS_PRESETS.map(preset => `
                                    <button
                                        onclick="app.setAndNext('${arg.key}', '${preset.value}')"
                                        class="p-3 rounded-xl text-center border-b-4 active:border-b-0 active:translate-y-1 ${
                                            val === preset.value
                                            ? 'bg-[#d97706] border-[#92400e] text-white'
                                            : 'bg-[#3a3a3a] border-[#252525] text-orange-200 hover:bg-[#4a4a4a]'
                                        }">
                                        <div class="font-bold text-sm mb-1">${preset.label.split(' (')[0]}</div>
                                        <div class="text-xs text-gray-400 font-mono">${preset.value}</div>
                                    </button>
                                `).join('')}
                            </div>
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="れい: 100 64 -100" class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white font-mono focus:border-[#d97706] outline-none text-lg" />
                        </div>`;
                        break;

                    case 'block':
                        controlHtml = `<div>
                            ${this.renderGridSelector(arg, BLOCK_PRESETS, this.state.blockCategory, 'setBlockCategory')}
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="IDをちょくせつにゅうりょく..." class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white focus:border-[#51cf38] outline-none mt-3" />
                        </div>`;
                        break;

                    case 'entity':
                        // blockCategoryを流用して表示制御（初期値をboss等にセットする処理が必要だが簡易的に）
                        if (!['boss','enemy','friend','item'].includes(this.state.blockCategory)) this.state.blockCategory = 'boss';
                        controlHtml = `<div>
                            ${this.renderGridSelector(arg, ENTITY_PRESETS, this.state.blockCategory, 'setBlockCategory')}
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="IDをちょくせつにゅうりょく..." class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white focus:border-[#51cf38] outline-none mt-3" />
                        </div>`;
                        break;

                    case 'sound':
                        if (!['fun','mob','block'].includes(this.state.blockCategory)) this.state.blockCategory = 'fun';
                        controlHtml = `<div>
                            ${this.renderGridSelector(arg, SOUND_PRESETS, this.state.blockCategory, 'setBlockCategory')}
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="IDをちょくせつにゅうりょく..." class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white focus:border-[#51cf38] outline-none mt-3" />
                        </div>`;
                        break;

                    case 'particle':
                        if (!['basic','magic','nature'].includes(this.state.blockCategory)) this.state.blockCategory = 'basic';
                        controlHtml = `<div>
                            ${this.renderGridSelector(arg, PARTICLE_PRESETS, this.state.blockCategory, 'setBlockCategory')}
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="IDをちょくせつにゅうりょく..." class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-white focus:border-[#51cf38] outline-none mt-3" />
                        </div>`;
                        break;
                    
                    default:
                        controlHtml = `<input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="${arg.placeholder || 'ここに入力してね...'}" class="w-full bg-[#151515] border border-[#444] p-4 rounded-xl text-lg text-white focus:border-[#3C8527] outline-none" autofocus />`;
                }
                return `<div class="animate-fade-in">${optionalMsg}${controlHtml}</div>`;
            }
        };

        app.init();
    </script>
</body>
</html>
