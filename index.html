                this.updateList();
                this.updateBuilder();
                
                // 検索イベントリスナー (Debounce付き)
                document.getElementById('search-input').addEventListener('input', (e) => {
                    clearTimeout(this.searchTimeout);
                    this.searchTimeout = setTimeout(() => {
                        this.state.searchQuery = e.target.value;
                        this.updateList();
                    }, 300); // 300ms待ってから実行
                });
                
                lucide.createIcons();
            },

            // --- State Management ---
            setState(updates) {
                const oldState = { ...this.state };
                this.state = { ...this.state, ...updates };
                
                if (updates.activeCategory !== undefined) {
                    this.updateTabs(); 
                    this.updateList();
                }
                
                // updateListは検索バーのイベントリスナーで別途制御しているのでここではsearchQueryは除外してもよいが、
                // 他の要因で変わった場合のために一応残す（今回はイベント経由なので重複実行は防がれている）

                if (updates.selectedCommandId !== undefined || 
                    updates.argsValues !== undefined || 
                    updates.activeArgIndex !== undefined || 
                    updates.blockCategory !== undefined || 
                    updates.copied !== undefined) {
                    this.updateBuilder();
                }
            },

            // --- Handlers ---
            handleCommandSelect(commandId) {
                // 強制リセット
                this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                this.setState({
                    selectedCommandId: commandId,
                    argsValues: {},
                    activeArgIndex: 0,
                    copied: false
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            handleCategorySelect(categoryId) {
                this.setState({ activeCategory: categoryId });
            },

            handleClearCommand() {
                this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                this.setState({ selectedCommandId: null, argsValues: {} });
            },

            // テキスト入力のハンドリング（重要：再描画せずにDOMだけ更新する）
            handleTextInput(key, value) {
                // Stateを更新 (再描画はしない)
                this.state.argsValues = { ...this.state.argsValues, [key]: value };
                
                // プレビューのDOMのみ更新
                const cmd = this.getSelectedCommand();
                if (cmd) {
                    const argIndex = cmd.args.findIndex(a => a.key === key);
                    if (argIndex !== -1) {
                        const span = document.getElementById(`preview-arg-${argIndex}`);
                        if (span) {
                            span.innerText = value || key;
                            // クラス操作 (値の有無でスタイル変更)
                            if (value) {
                                span.classList.add('bg-[#3C8527]', 'text-white', 'border-b-0');
                                span.classList.remove('text-gray-600', 'border-dashed', 'text-white', 'border-b');
                            } else {
                                // アクティブだけど空の状態に戻す(本来はここに来ないが念の為)
                            }
                        }
                    }
                }
            },

            updateArgValue(key, value) {
                const newArgs = { ...this.state.argsValues, [key]: value };
                this.setState({ argsValues: newArgs });
            },

            nextArg() {
                const cmd = this.getSelectedCommand();
                if (cmd && this.state.activeArgIndex < cmd.args.length - 1) {
                    this.setState({ activeArgIndex: this.state.activeArgIndex + 1 });
                }
            },

            prevArg() {
                if (this.state.activeArgIndex > 0) {
                    this.setState({ activeArgIndex: this.state.activeArgIndex - 1 });
                }
            },

            setAndNext(key, value) {
                this.state.argsValues = { ...this.state.argsValues, [key]: value };
                
                // まず現在のビューを更新（選択状態の反映）
                this.updateBuilder(true); 

                // 少し待ってから次へ
                setTimeout(() => {
                    const cmd = this.getSelectedCommand();
                    if (cmd && this.state.activeArgIndex < cmd.args.length - 1) {
                        this.setState({ activeArgIndex: this.state.activeArgIndex + 1 });
                    }
                }, 150);
            },

            setBlockCategory(category) {
                this.setState({ blockCategory: category });
            },

            copyToClipboard() {
                const cmd = this.getSelectedCommand();
                if (!cmd) return;
                
                let cmdStr = cmd.name;
                cmd.args.forEach(arg => {
                    const val = this.state.argsValues[arg.key];
                    if (val) {
                         if (cmd.id === 'xp' && arg.key === 'type' && val === 'L') {
                             cmdStr += ` ${val}`;
                        } else {
                             cmdStr += ` ${val}`;
                        }
                    }
                });

                const textArea = document.createElement("textarea");
                textArea.value = cmdStr;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    this.setState({ copied: true });
                    setTimeout(() => this.setState({ copied: false }), 2000);
                } catch (err) {
                    console.error(err);
                }
                document.body.removeChild(textArea);
            },

            // --- Partial Render Functions ---

            updateTabs() {
                const cats = [
                    { id: 'all', label: 'すべて', icon: 'list' },
                    { id: 'basic', label: '基本', icon: 'terminal' },
                    { id: 'cheat', label: 'チート', icon: 'zap' },
                    { id: 'build', label: '建築', icon: 'box' },
                    { id: 'teleport', label: '移動', icon: 'map-pin' },
                    { id: 'other', label: 'その他', icon: 'grid' },
                ];
                
                const html = cats.map(cat => `
                    <button
                        onclick="app.handleCategorySelect('${cat.id}')"
                        class="flex items-center gap-2 px-4 py-2 rounded-full whitespace-nowrap transition-colors border ${
                        this.state.activeCategory === cat.id 
                            ? 'bg-[#3C8527] text-white border-[#3C8527] shadow-lg shadow-green-900/50' 
                            : 'bg-[#2a2a2a] text-gray-400 border-[#444] hover:bg-[#333]'
                        }">
                        <i data-lucide="${cat.icon}" class="w-4 h-4"></i>
                        <span class="text-sm font-medium">${cat.label}</span>
                    </button>
                `).join('');
                
                document.getElementById('category-tabs').innerHTML = html;
                lucide.createIcons();
            },

            updateList() {
                const filtered = COMMANDS_DATA.filter(cmd => {
                    const matchesCategory = this.state.activeCategory === 'all' || cmd.category === this.state.activeCategory;
                    const matchesSearch = cmd.name.toLowerCase().includes(this.state.searchQuery.toLowerCase()) || 
                                          cmd.description.includes(this.state.searchQuery) ||
                                          (cmd.name.replace('/', '')).includes(this.state.searchQuery);
                    return matchesCategory && matchesSearch;
                });

                const html = filtered.length === 0 
                    ? '<div class="text-center py-10 text-gray-500">コマンドが見つかりませんでした</div>'
                    : filtered.map(cmd => {
                        const isSelected = this.state.selectedCommandId === cmd.id;
                        const syntax = cmd.name + ' ' + cmd.args.map(a => a.optional ? `[${a.key}]` : `<${a.key}>`).join(' ');
                        return `
                        <button
                            onclick="app.handleCommandSelect('${cmd.id}')"
                            class="text-left p-4 rounded-lg border-2 transition-all active:scale-[0.98] group w-full ${
                            isSelected
                                ? 'bg-[#2d3a2d] border-[#3C8527] ring-1 ring-[#3C8527]'
                                : 'bg-[#2a2a2a] border-[#3a3a3a] hover:border-[#555]'
                            }">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-mono text-lg font-bold text-[#51cf38] group-hover:text-white transition-colors">
                                    ${cmd.name}
                                </span>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 transition-transform ${isSelected ? 'rotate-90 text-[#3C8527]' : ''}"></i>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">${cmd.description}</div>
                            <div class="text-xs font-mono text-gray-500 bg-[#151515] p-2 rounded inline-block border border-[#333]">
                                ${syntax}
                            </div>
                        </button>`;
                    }).join('');
                
                document.getElementById('command-list').innerHTML = html;
                lucide.createIcons();
            },

            updateBuilder(forceUpdate = false) {
                const cmd = this.getSelectedCommand();
                const container = document.getElementById('builder-area');

                if (!cmd) {
                    if (this.lastRendered.commandId !== null) { // 変更があった場合のみ書き換え
                        container.innerHTML = `
                        <div class="bg-[#2a2a2a] border-2 border-dashed border-[#444] rounded-lg p-8 text-center text-gray-500">
                            <i data-lucide="terminal" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>
                            <p>下のリストからコマンドを選択してください</p>
                        </div>`;
                        lucide.createIcons();
                        this.lastRendered = { commandId: null, argIndex: null, blockCategory: null };
                    }
                    return;
                }

                // 最適化: コマンド、引数インデックス、ブロックカテゴリが変わっていない場合は、HTML全書き換えをスキップしたい
                // ただし、argsValuesの変更によるプレビュー更新や、コピーボタンの状態変化は反映したい。
                // テキスト入力以外の値変更（ボタン選択）は強制更新(forceUpdate)される。
                const shouldFullRender = forceUpdate || 
                                       this.state.copied || 
                                       cmd.id !== this.lastRendered.commandId || 
                                       this.state.activeArgIndex !== this.lastRendered.argIndex ||
                                       this.state.blockCategory !== this.lastRendered.blockCategory;

                if (!shouldFullRender) {
                    // 全書き換え不要の場合でも、プレビューエリアのクラス更新などは必要かもしれないが、
                    // テキスト入力(handleTextInput)とボタン選択(setAndNext->forceUpdate)でカバーされているため、
                    // ここでは何もしなくて良い。
                    return;
                }

                this.lastRendered = { 
                    commandId: cmd.id, 
                    argIndex: this.state.activeArgIndex, 
                    blockCategory: this.state.blockCategory 
                };

                const activeArg = cmd.args[this.state.activeArgIndex];
                
                // プレビュー生成
                const previewSpans = cmd.args.map((arg, idx) => {
                    const isActive = idx === this.state.activeArgIndex;
                    const hasValue = !!this.state.argsValues[arg.key];
                    const val = this.state.argsValues[arg.key] || arg.key;
                    // スタイル決定
                    let classes = "mx-1 px-1 rounded cursor-pointer transition-colors inline-block ";
                    if (isActive) {
                        classes += "bg-[#3C8527] text-white ring-2 ring-white/50";
                    } else if (hasValue) {
                        classes += "text-white border-b border-gray-600";
                    } else {
                        classes += "text-gray-600 border border-dashed border-gray-700";
                    }

                    return `<span 
                        id="preview-arg-${idx}"
                        onclick="app.setState({ activeArgIndex: ${idx} })"
                        class="${classes}">${val}</span>`;
                }).join('');

                container.innerHTML = `
                <div class="bg-[#2a2a2a] border-2 border-[#585858] rounded-lg overflow-hidden shadow-xl ring-4 ring-[#151515] animate-fade-in">
                    <!-- Toolbar -->
                    <div class="bg-[#353535] px-3 py-2 border-b border-[#585858] flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[#51cf38] font-bold font-mono">${cmd.name}</span>
                            <span class="text-xs text-gray-400 truncate max-w-[150px]">${cmd.description}</span>
                        </div>
                        <button onclick="app.handleClearCommand()" class="text-gray-400 hover:text-white p-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <!-- Preview -->
                    <div class="p-4 bg-[#151515] border-b border-[#333]">
                        <div class="font-mono text-lg break-all leading-relaxed">
                            <span class="text-[#51cf38] font-bold">${cmd.name}</span>
                            ${previewSpans}
                        </div>
                    </div>

                    <!-- Copy Button -->
                    <div class="px-4 py-2 bg-[#1a1a1a] flex justify-end border-b border-[#333]">
                        <button 
                            onclick="app.copyToClipboard()"
                            class="flex items-center gap-2 px-6 py-2 rounded font-bold transition-all active:scale-95 ${
                            this.state.copied 
                                ? 'bg-white text-[#3C8527]' 
                                : 'bg-[#51cf38] text-[#1a1a1a] hover:bg-[#61df48]'
                            }">
                            ${this.state.copied 
                                ? '<i data-lucide="check" class="w-5 h-5"></i> COPIED!' 
                                : '<i data-lucide="copy" class="w-5 h-5"></i> COPY COMMAND'}
                        </button>
                    </div>

                    <!-- Input Wizard -->
                    <div class="p-4 bg-[#222]">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-bold text-gray-300 uppercase flex items-center gap-2">
                                <i data-lucide="edit-3" class="w-4 h-4 text-[#51cf38]"></i>
                                SET: <span class="text-white bg-[#333] px-2 py-0.5 rounded ml-1">
                                    ${activeArg ? activeArg.label : '完了'}
                                </span>
                            </h3>
                            <div class="flex gap-2">
                                <button onclick="app.prevArg()" ${this.state.activeArgIndex === 0 ? 'disabled' : ''} class="p-2 rounded bg-[#333] disabled:opacity-30 text-white">←</button>
                                <button onclick="app.nextArg()" ${this.state.activeArgIndex === cmd.args.length - 1 ? 'disabled' : ''} class="p-2 rounded bg-[#333] disabled:opacity-30 text-white">→</button>
                            </div>
                        </div>

                        <div class="min-h-[150px]">
                            ${activeArg ? this.renderInputControl(activeArg) : `
                                <div class="flex flex-col items-center justify-center h-full text-gray-500 py-4">
                                    <i data-lucide="check" class="w-12 h-12 mb-2 text-[#3C8527]"></i>
                                    <p>設定完了！コピーして使用してください。</p>
                                </div>
                            `}
                        </div>
                    </div>
                </div>`;
                lucide.createIcons();

                // テキスト入力の場合、初期フォーカスを設定（値が空の時のみ）
                const txtInput = container.querySelector('input[type="text"]');
                const argVal = activeArg ? this.state.argsValues[activeArg.key] : null;
                if(txtInput && !argVal && document.activeElement !== txtInput) { 
                     txtInput.focus();
                }
            },

            renderInputControl(arg) {
                const val = this.state.argsValues[arg.key] || '';
                const optionalMsg = arg.optional ? '<div class="mb-2 text-xs text-yellow-500/80 flex items-center gap-1">* これは省略可能です。次へ進むとスキップされます。</div>' : '';

                let controlHtml = '';

                switch(arg.type) {
                    case 'select':
                    case 'boolean':
                        const opts = arg.type === 'boolean' ? BOOLEAN_OPTS : arg.options;
                        controlHtml = `<div class="grid grid-cols-2 gap-2">
                            ${opts.map(opt => `
                                <button
                                    onclick="app.setAndNext('${arg.key}', '${opt.value}')"
                                    class="p-3 rounded text-sm font-medium transition-all text-left border-l-4 ${
                                    val === opt.value
                                        ? 'bg-[#2d3a2d] border-[#3C8527] text-white'
                                        : 'bg-[#3a3a3a] border-transparent text-gray-300 hover:bg-[#4a4a4a]'
                                    }">
                                    <div class="font-bold">${opt.label.split(' (')[0]}</div>
                                    <div class="text-xs text-gray-500 font-mono">${opt.value}</div>
                                </button>
                            `).join('')}
                        </div>`;
                        break;

                    case 'selector':
                        controlHtml = `<div class="grid grid-cols-3 gap-2">
                            ${SELECTORS.map(sel => `
                                <button
                                    onclick="app.setAndNext('${arg.key}', '${sel.value}')"
                                    class="p-3 rounded text-center transition-all border-b-4 active:border-b-0 active:translate-y-1 ${
                                        val === sel.value
                                        ? 'bg-[#3C8527] border-[#2a611b] text-white'
                                        : 'bg-[#3a3a3a] border-[#252525] text-[#51cf38] hover:bg-[#4a4a4a]'
                                    }">
                                    <div class="text-lg font-bold font-mono">${sel.value}</div>
                                    <div class="text-[10px] text-gray-400">${sel.label.split(' (')[0]}</div>
                                </button>
                            `).join('')}
                            <div class="col-span-3 mt-2">
                                <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="またはプレイヤー名を直接入力" class="w-full bg-[#151515] border border-[#444] p-3 rounded text-white focus:border-[#3C8527] outline-none" />
                            </div>
                        </div>`;
                        break;

                    case 'coords':
                        controlHtml = `<div class="space-y-3">
                            <div class="grid grid-cols-2 gap-2">
                                ${COORDS_PRESETS.map(preset => `
                                    <button
                                        onclick="app.setAndNext('${arg.key}', '${preset.value}')"
                                        class="p-3 rounded text-center border-b-4 active:border-b-0 active:translate-y-1 ${
                                            val === preset.value
                                            ? 'bg-[#d97706] border-[#92400e] text-white'
                                            : 'bg-[#3a3a3a] border-[#252525] text-orange-200 hover:bg-[#4a4a4a]'
                                        }">
                                        <div class="font-mono font-bold text-sm">${preset.value}</div>
                                        <div class="text-[10px] text-gray-400">${preset.label.split(' (')[0]}</div>
                                    </button>
                                `).join('')}
                            </div>
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="例: 100 64 -100" class="w-full bg-[#151515] border border-[#444] p-3 rounded text-white font-mono focus:border-[#d97706] outline-none" />
                        </div>`;
                        break;

                    case 'block':
                        controlHtml = `<div class="space-y-3">
                            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
                                ${Object.keys(BLOCK_PRESETS).map(cat => `
                                    <button 
                                        onclick="app.setBlockCategory('${cat}')"
                                        class="text-xs px-3 py-1 rounded-full whitespace-nowrap border ${
                                            this.state.blockCategory === cat 
                                            ? 'bg-[#51cf38] text-black border-[#51cf38] font-bold'
                                            : 'bg-[#222] text-gray-400 border-[#444]'
                                        }">
                                        ${cat === 'basic' ? '基本' : cat === 'equipment' ? '装備' : cat === 'armor' ? '防具' : cat === 'food' ? '食料' : cat === 'building' ? '建築' : cat === 'utility' ? '機能' : cat === 'redstone' ? '回路' : '特殊'}
                                    </button>
                                `).join('')}
                            </div>
                            <div class="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                ${BLOCK_PRESETS[this.state.blockCategory].map(block => `
                                    <button
                                        onclick="app.setAndNext('${arg.key}', '${block.value}')"
                                        class="p-2 rounded flex flex-col items-center justify-center border transition-all hover:bg-[#444] ${
                                            val === block.value
                                            ? 'bg-[#333] border-[#51cf38] text-[#51cf38]'
                                            : 'bg-[#2a2a2a] border-[#333] text-gray-300'
                                        }">
                                        <span class="text-xs font-bold">${block.label}</span>
                                        <span class="text-[10px] font-mono text-gray-500 truncate w-full text-center">${block.value}</span>
                                    </button>
                                `).join('')}
                            </div>
                            <input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="ブロックIDを直接入力..." class="w-full bg-[#151515] border border-[#444] p-3 rounded text-white focus:border-[#51cf38] outline-none" />
                        </div>`;
                        break;
                    
                    default:
                        controlHtml = `<input type="text" value="${val}" oninput="app.handleTextInput('${arg.key}', this.value)" placeholder="${arg.placeholder || '入力してください...'}" class="w-full bg-[#151515] border border-[#444] p-4 rounded text-lg text-white focus:border-[#3C8527] outline-none" autofocus />`;
                }

                return `<div class="animate-fade-in">${optionalMsg}${controlHtml}</div>`;
            }
        };

        app.init();
    </script>
</body>
</html>
